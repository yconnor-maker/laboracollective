<!-- ══ LC SHARED COMPONENT: Journal Panel Card ══
     Usage: Reusable card for linking to a journal section.
     Duplicate and modify the values for each journal.

     Color classes:
       Women's Health:  tag="wh"  dot="wh-dot"  cta="wh"  accent=copper
       In Her Name:     tag="ihn" dot="ihn-dot" cta="ihn" accent=rose
       Blueprint:       tag="bp"  dot="bp-dot"  cta="bp"  accent=teal

     Replace:
       - {{JOURNAL_TAG_CLASS}}  → wh | ihn | bp
       - {{JOURNAL_TAG_LABEL}}  → Women's Health | Policy & Justice | Research & Practice
       - {{JOURNAL_ICON_SRC}}   → /assets/images/wh-icon.png (etc.)
       - {{JOURNAL_ICON_ALT}}   → Alt text for icon
       - {{JOURNAL_NAME_HTML}}  → e.g. Women's Health<br><em>Journal</em>
       - {{JOURNAL_TAGLINE}}    → Description text
       - {{DOT_CLASS}}          → wh-dot | ihn-dot | bp-dot
       - {{SUB_NAME}}           → Sub-journal name
       - {{SUB_DESC}}           → Sub-journal description
       - {{CTA_CLASS}}          → wh | ihn | bp
       - {{CTA_HREF}}           → Link URL
       - {{CTA_TEXT}}           → e.g. Explore Women's Health Journal →
══ -->

<!-- SINGLE JOURNAL PANEL -->
<div class="journal-panel">
  <div class="journal-panel-header">
    <div class="journal-logo-wrap">
      <img src="{{JOURNAL_ICON_SRC}}" alt="{{JOURNAL_ICON_ALT}}">
    </div>
    <span class="journal-tag {{JOURNAL_TAG_CLASS}}">{{JOURNAL_TAG_LABEL}}</span>
    <h3 class="journal-name">{{JOURNAL_NAME_HTML}}</h3>
    <p class="journal-tagline">{{JOURNAL_TAGLINE}}</p>
  </div>
  <div class="journal-panel-body">
    <ul class="subjournal-list">
      <li class="subjournal-item">
        <span class="subjournal-dot {{DOT_CLASS}}"></span>
        <div class="subjournal-text">
          <span class="subjournal-name">{{SUB_NAME}}</span>
          <span class="subjournal-desc">{{SUB_DESC}}</span>
        </div>
      </li>
      <!-- Duplicate <li> blocks for additional sub-journals -->
    </ul>
  </div>
  <div class="journal-panel-footer">
    <a href="{{CTA_HREF}}" class="journal-cta {{CTA_CLASS}}">{{CTA_TEXT}}</a>
  </div>
</div>
