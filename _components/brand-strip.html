<!-- ══ LC SHARED COMPONENT: Brand Strip / Membership CTA ══
     Usage: Place between main content and footer as a newsletter/membership call-to-action.
     Can be used on any page. Adjust links as needed.
══ -->

<section class="brand-strip">
  <div class="brand-strip-inner">
    <div class="brand-strip-content">
      <span class="brand-strip-label">Join the Collective</span>
      <h2 class="brand-strip-headline">Physician-led intelligence.<br>Delivered to your inbox.</h2>
      <p class="brand-strip-desc">Free subscribers get the Monday and Wednesday Signal — clinical intelligence on OB and GYN. Members unlock the full Labora Briefing, domain reports, Ask Dr. Connor, and more.</p>
    </div>
    <div class="brand-strip-actions">
      <a href="https://laboracollective.substack.com/subscribe" class="brand-strip-btn primary">Subscribe Free →</a>
      <a href="https://laboracollective.substack.com/subscribe" class="brand-strip-btn secondary">Become a Member →</a>
    </div>
  </div>
</section>
