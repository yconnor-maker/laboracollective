<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Letters to Motherhood — The Labora Collective</title>
  <style>

    :root {
      --deep-brown: #2C1A0E;
      --copper: #C8825A;
      --blush: #EDB8A8;
      --coral: #D97068;
      --lavender: #EEE8F0;
      --off-white: #FAF7F4;
    }
    body {
      font-family: Georgia, serif;
      background-color: var(--off-white);
      color: var(--deep-brown);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(44, 26, 14, 0.1);
      border-top: 6px solid var(--copper);
    }
    h1 {
      color: var(--deep-brown);
      margin-bottom: 10px;
      font-size: 2em;
    }
    .label {
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.8em;
      color: var(--coral);
      margin-bottom: 20px;
    }
    p {
      line-height: 1.6;
      color: var(--deep-brown);
    }
    .coming-soon {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 16px;
      background-color: var(--blush);
      color: var(--deep-brown);
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 0.9em;
      font-weight: bold;
    }
    a {
      display: inline-block;
      margin-top: 30px;
      color: var(--copper);
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 0.9em;
      border-bottom: 1px solid var(--copper);
    }
    a:hover {
      color: var(--coral);
      border-bottom-color: var(--coral);
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="label">The Labora Collective</div>
    <h1>Love Letters to Motherhood</h1>
    <p>Recurring column series.</p>
    <div class="coming-soon">Coming Soon</div>
    <br>
    <a href="/">← Back to Homepage</a>
  </div>
</body>
</html>
